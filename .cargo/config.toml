[build]
# 6 of 8 cores — leaves headroom to avoid OOM on Android
jobs = 6

[target.aarch64-linux-android]
rustflags = ["-C", "target-cpu=cortex-x4", "-C", "target-feature=+sve2,+dotprod,+fp16fml", "-C", "opt-level=3"]

[target.aarch64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=native", "-C", "target-feature=+neon,+fp16,+dotprod", "-C", "opt-level=3"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "target-cpu=apple-m1", "-C", "opt-level=3"]

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=x86-64-v3", "-C", "target-feature=+avx2,+fma", "-C", "opt-level=3"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "target-cpu=native", "-C", "opt-level=3"]
